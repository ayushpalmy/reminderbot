services:
  # Node.js Backend Service
  - type: web
    name: whatsapp-reminder-bot
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && yarn install
    startCommand: cd backend && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8001
      - key: APP_URL
        value: https://whatsapp-reminder-bot-i2e2.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: reminder-bot-db
          property: connectionString
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: CORS_ORIGINS
        value: "*"

databases:
  # PostgreSQL Database
  - name: reminder-bot-db
    plan: free
    databaseName: whatsapp_bot_db
    user: whatsapp_bot
    region: singapore
